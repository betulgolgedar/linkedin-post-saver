<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Post Saver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 500px;
      max-height: 600px;
      background: #0A0A0F;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #1A1A2E;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #0077B5, #00D4FF);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .badge {
      background: #1A1A2E;
      color: #00D4FF;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid #00D4FF30;
    }

    /* Search */
    .search-bar {
      padding: 10px 14px;
      border-bottom: 1px solid #1A1A2E;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: #111;
      border: 1px solid #1A1A2E;
      border-radius: 8px;
      padding: 8px 12px;
      color: #E2E8F0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: #0077B5;
    }

    .search-input::placeholder { color: #444; }

    /* Limit bar */
    .limit-bar {
      padding: 8px 14px;
      background: #0F0F1A;
      border-bottom: 1px solid #1A1A2E;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .limit-track {
      flex: 1;
      height: 3px;
      background: #1A1A2E;
      border-radius: 99px;
      overflow: hidden;
    }

    .limit-fill {
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #A78BFA);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .limit-text {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
    }

    /* Posts list */
    .posts-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .posts-list::-webkit-scrollbar { width: 3px; }
    .posts-list::-webkit-scrollbar-track { background: transparent; }
    .posts-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* Post card */
    .post-card {
      padding: 12px 14px;
      border-bottom: 1px solid #111;
      transition: background 0.15s;
      cursor: pointer;
    }

    .post-card:hover { background: #0F0F1A; }

    .post-author {
      font-weight: 600;
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .post-author a {
      color: #0077B5;
      text-decoration: none;
    }

    .post-author a:hover { text-decoration: underline; }

    .delete-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #EF4444; }

    .post-text {
      font-size: 12px;
      color: #64748B;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .tag {
      background: #1A1A2E;
      color: #A78BFA;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid #A78BFA30;
    }

    .add-tag-btn {
      background: none;
      border: 1px dashed #333;
      color: #444;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-tag-btn:hover { border-color: #A78BFA; color: #A78BFA; }

    .post-link {
      font-size: 10px;
      color: #333;
      text-decoration: none;
      display: block;
      margin-top: 6px;
      transition: color 0.2s;
    }

    .post-link:hover { color: #0077B5; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #333;
      padding: 40px 20px;
      text-align: center;
    }

    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-title { color: #555; font-size: 13px; font-weight: 600; }
    .empty-desc { font-size: 11px; line-height: 1.6; color: #333; }

    /* Footer */
    .footer {
      padding: 10px 14px;
      border-top: 1px solid #1A1A2E;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .footer-btn {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: #111;
      color: #666;
      border: 1px solid #1A1A2E;
    }

    .btn-secondary:hover { color: #EF4444; border-color: #EF4444; }

    .btn-primary {
      background: linear-gradient(135deg, #0077B5, #00D4FF);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔖</div>
      Post Saver
    </div>
    <div class="badge" id="plan-badge">Free Plan</div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input class="search-input" id="search" type="text" placeholder="Postlarda ara..." />
  </div>

  <!-- Limit bar -->
  <div class="limit-bar">
    <div class="limit-track">
      <div class="limit-fill" id="limit-fill" style="width: 0%"></div>
    </div>
    <div class="limit-text" id="limit-text">0 / 20 kayıt</div>
  </div>

  <!-- Posts -->
  <div class="posts-list" id="posts-list"></div>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-btn btn-secondary" id="clear-btn">Tümünü Sil</button>
    <button class="footer-btn btn-primary" id="upgrade-btn">✨ Premium'a Geç</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
